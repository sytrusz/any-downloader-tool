name: Build Portable anydl

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: anydl.exe
            bundle_name: anydl-windows.exe
            sep: ";"
          - os: ubuntu-latest
            artifact_name: anydl
            bundle_name: anydl-linux
            sep: ":"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Setup Binaries (Linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p bin
          # Download yt-dlp
          gh release download --repo yt-dlp/yt-dlp --pattern "yt-dlp" --output bin/yt-dlp
          
          # Download spotdl
          gh release download --repo spotDL/spotify-downloader --pattern "*linux" --output bin/spotdl
          
          # Download ffmpeg
          curl -L https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz -o ffmpeg.tar.xz
          tar -xf ffmpeg.tar.xz
          cp ffmpeg-*-amd64-static/ffmpeg bin/
          
          chmod +x bin/*
          ls -l bin/

      - name: Setup Binaries (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p bin
          # Download yt-dlp
          gh release download --repo yt-dlp/yt-dlp --pattern "yt-dlp.exe" --output bin/yt-dlp.exe
          
          # Download spotdl
          gh release download --repo spotDL/spotify-downloader --pattern "*win.exe" --output bin/spotdl.exe
          
          # Download ffmpeg
          curl -L "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -o ffmpeg.zip
          unzip ffmpeg.zip
          cp ffmpeg-*-essentials_build/bin/ffmpeg.exe bin/
          
          ls -l bin/

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller --noconsole --onefile --add-data "bin${{ matrix.sep }}bin" --name anydl main.py

      - name: Rename Artifact
        shell: bash
        run: |
          mv dist/${{ matrix.artifact_name }} dist/${{ matrix.bundle_name }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/${{ matrix.bundle_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
